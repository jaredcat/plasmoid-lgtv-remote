name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v1.0.0)"
        required: false

permissions:
  contents: write

jobs:
  # Get version
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

  # Build KDE Plasmoid
  build-plasmoid:
    needs: prepare
    uses: ./.github/workflows/build-plasmoid.yml
    with:
      version: ${{ needs.prepare.outputs.version }}

  # Build Tauri tray app
  build-tray:
    needs: prepare
    uses: ./.github/workflows/build-tray.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
    secrets:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  # Create GitHub Release
  release:
    needs: [prepare, build-plasmoid, build-tray]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.plasmoid" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.msi" -o -name "*.exe" -o -name "*.dmg" \) -exec cp {} release/ \;
          ls -la release/

      - name: Generate latest.json for updater
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          VERSION="${VERSION#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="jaredcat/plasmoid-lgtv-remote"
          TAG="${{ needs.prepare.outputs.version }}"

          # Read signatures from .sig files
          read_sig() {
            local pattern="$1"
            local sig_file
            sig_file=$(find artifacts -name "$pattern" -type f | head -1)
            if [ -n "$sig_file" ] && [ -f "$sig_file" ]; then
              cat "$sig_file"
            else
              echo ""
            fi
          }

          # Find updater artifact filenames
          find_artifact() {
            local pattern="$1"
            local artifact
            artifact=$(find artifacts -name "$pattern" -type f | head -1)
            if [ -n "$artifact" ]; then
              basename "$artifact"
            else
              echo ""
            fi
          }

          # Linux AppImage
          LINUX_SIG=$(read_sig "*.AppImage.sig")
          LINUX_FILE=$(find_artifact "*.AppImage")

          # Windows NSIS
          WINDOWS_SIG=$(read_sig "*.nsis.zip.sig")
          WINDOWS_FILE=$(find_artifact "*.nsis.zip")

          # macOS arm64
          MACOS_ARM_SIG=$(read_sig "*.app.tar.gz.sig")
          MACOS_ARM_FILE=""
          # Find arm64 tar.gz specifically
          for f in $(find artifacts/lgtv-tray-macos-arm64 -name "*.app.tar.gz" -type f 2>/dev/null); do
            MACOS_ARM_FILE=$(basename "$f")
            MACOS_ARM_SIG=$(cat "${f}.sig" 2>/dev/null || echo "")
            break
          done

          # macOS x64
          MACOS_X64_SIG=""
          MACOS_X64_FILE=""
          for f in $(find artifacts/lgtv-tray-macos-x64 -name "*.app.tar.gz" -type f 2>/dev/null); do
            MACOS_X64_FILE=$(basename "$f")
            MACOS_X64_SIG=$(cat "${f}.sig" 2>/dev/null || echo "")
            break
          done

          # Build JSON (only include platforms with both file and signature)
          PLATFORMS="{"
          FIRST=true

          if [ -n "$LINUX_FILE" ] && [ -n "$LINUX_SIG" ]; then
            PLATFORMS="$PLATFORMS\"linux-x86_64\":{\"url\":\"https://github.com/$REPO/releases/download/$TAG/$LINUX_FILE\",\"signature\":\"$LINUX_SIG\"}"
            FIRST=false
          fi

          if [ -n "$WINDOWS_FILE" ] && [ -n "$WINDOWS_SIG" ]; then
            [ "$FIRST" = false ] && PLATFORMS="$PLATFORMS,"
            PLATFORMS="$PLATFORMS\"windows-x86_64\":{\"url\":\"https://github.com/$REPO/releases/download/$TAG/$WINDOWS_FILE\",\"signature\":\"$WINDOWS_SIG\"}"
            FIRST=false
          fi

          if [ -n "$MACOS_ARM_FILE" ] && [ -n "$MACOS_ARM_SIG" ]; then
            [ "$FIRST" = false ] && PLATFORMS="$PLATFORMS,"
            PLATFORMS="$PLATFORMS\"darwin-aarch64\":{\"url\":\"https://github.com/$REPO/releases/download/$TAG/$MACOS_ARM_FILE\",\"signature\":\"$MACOS_ARM_SIG\"}"
            FIRST=false
          fi

          if [ -n "$MACOS_X64_FILE" ] && [ -n "$MACOS_X64_SIG" ]; then
            [ "$FIRST" = false ] && PLATFORMS="$PLATFORMS,"
            PLATFORMS="$PLATFORMS\"darwin-x86_64\":{\"url\":\"https://github.com/$REPO/releases/download/$TAG/$MACOS_X64_FILE\",\"signature\":\"$MACOS_X64_SIG\"}"
          fi

          PLATFORMS="$PLATFORMS}"

          cat > release/latest.json <<EOF
          {
            "version": "$VERSION",
            "pub_date": "$PUB_DATE",
            "platforms": $PLATFORMS
          }
          EOF

          # Strip leading whitespace from heredoc indentation
          sed -i 's/^          //' release/latest.json

          # Pretty-print for verification
          cat release/latest.json | python3 -m json.tool || cat release/latest.json

      - name: Copy updater artifacts to release
        run: |
          find artifacts -type f \( -name "*.AppImage.sig" -o -name "*.nsis.zip" -o -name "*.nsis.zip.sig" -o -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \) -exec cp {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          files: release/*
          generate_release_notes: true
          body: |
            ## LG TV Remote ${{ needs.prepare.outputs.version }}

            ### Downloads

            **Cross-Platform Tray App** (Windows, macOS, Linux):
            - **Windows**: `.msi` (installer) or `.exe` (portable)
            - **macOS**: `.dmg` (Intel: x64, Apple Silicon: arm64)
            - **Linux**: `.AppImage` (universal), `.deb` (Debian/Ubuntu), `.rpm` (Fedora/RHEL)

            **KDE Plasma Widget** (Linux with KDE Plasma 6):
            - `lgtv-remote.plasmoid` - Install via System Settings or `kpackagetool6 -t Plasma/Applet -i lgtv-remote.plasmoid`

            ### First-Time Setup
            1. Enter your TV's IP address (find in TV Settings → Network)
            2. Click **Authenticate** and accept the pairing prompt on your TV
            3. Use the remote controls or keyboard shortcuts

            ### Requirements
            - **Plasmoid**: Python 3 with `websockets` module
            - **Tray App**: No additional dependencies

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
