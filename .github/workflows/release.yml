name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v1.0.0)"
        required: false

permissions:
  contents: write

jobs:
  # Get version
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

  # Build KDE Plasmoid
  build-plasmoid:
    needs: prepare
    uses: ./.github/workflows/build-plasmoid.yml
    with:
      version: ${{ needs.prepare.outputs.version }}

  # Build Tauri tray app
  build-tray:
    needs: prepare
    uses: ./.github/workflows/build-tray.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
    secrets:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  # Create GitHub Release
  release:
    needs: [prepare, build-plasmoid, build-tray]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.plasmoid" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.msi" -o -name "*.exe" -o -name "*.dmg" \) -exec cp {} release/ \;
          ls -la release/

      - name: Generate latest.json and collect updater artifacts
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          VERSION="${VERSION#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="jaredcat/plasmoid-lgtv-remote"
          TAG="${{ needs.prepare.outputs.version }}"

          # Helper: find a single file by glob pattern within a directory, space-safe
          find_one() {
            find "$1" -name "$2" -type f -print0 2>/dev/null | head -z -n1 | tr -d '\0'
          }

          # Helper: read signature content from a .sig file path
          sig_of() {
            local sig_file="${1}.sig"
            if [ -f "$sig_file" ]; then
              cat "$sig_file"
            fi
          }

          # Helper: URL-encode spaces in filename for GitHub release URLs
          url_encode() {
            echo "$1" | sed 's/ /%20/g'
          }

          # Build platform entries using jq for proper JSON construction
          PLATFORMS='{}'

          add_platform() {
            local key="$1" dir="$2" pattern="$3"
            local file sig name url
            file=$(find_one "$dir" "$pattern")
            if [ -z "$file" ]; then
              echo "WARN: no $pattern found in $dir"
              return
            fi
            sig=$(sig_of "$file")
            if [ -z "$sig" ]; then
              echo "WARN: no signature for $file"
              return
            fi
            name=$(basename "$file")
            url="https://github.com/$REPO/releases/download/$TAG/$(url_encode "$name")"
            PLATFORMS=$(echo "$PLATFORMS" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          d['$key'] = {'url': '''$url''', 'signature': '''$sig'''}
          json.dump(d, sys.stdout)
          ")
            # Copy updater artifact + signature to release/
            cp "$file" release/
            cp "${file}.sig" release/
            echo "OK: $key -> $name"
          }

          add_platform "linux-x86_64"    "artifacts/lgtv-tray-linux"       "*.AppImage"
          add_platform "windows-x86_64"  "artifacts/lgtv-tray-windows"     "*.nsis.zip"
          add_platform "darwin-aarch64"   "artifacts/lgtv-tray-macos-arm64" "*.app.tar.gz"
          add_platform "darwin-x86_64"    "artifacts/lgtv-tray-macos-x64"  "*.app.tar.gz"

          python3 -c "
          import json, sys
          platforms = json.loads('''$PLATFORMS''')
          manifest = {
            'version': '$VERSION',
            'pub_date': '$PUB_DATE',
            'platforms': platforms
          }
          with open('release/latest.json', 'w') as f:
            json.dump(manifest, f, indent=2)
          print(json.dumps(manifest, indent=2))
          "

          echo ""
          echo "=== release/ contents ==="
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          files: release/*
          generate_release_notes: true
          body: |
            ## LG TV Remote ${{ needs.prepare.outputs.version }}

            ### Downloads

            **Cross-Platform Tray App** (Windows, macOS, Linux):
            - **Windows**: `.msi` (installer) or `.exe` (portable)
            - **macOS**: `.dmg` (Intel: x64, Apple Silicon: arm64)
            - **Linux**: `.AppImage` (universal), `.deb` (Debian/Ubuntu), `.rpm` (Fedora/RHEL)

            **KDE Plasma Widget** (Linux with KDE Plasma 6):
            - `lgtv-remote.plasmoid` - Install via System Settings or `kpackagetool6 -t Plasma/Applet -i lgtv-remote.plasmoid`

            ### First-Time Setup
            1. Enter your TV's IP address (find in TV Settings → Network)
            2. Click **Authenticate** and accept the pairing prompt on your TV
            3. Use the remote controls or keyboard shortcuts

            ### Requirements
            - **Plasmoid**: Python 3 with `websockets` module
            - **Tray App**: No additional dependencies

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
